name: Build and Publish

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64, x86]
        
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore NVevaAce.sln
      
    - name: Build
      run: dotnet build NVevaAce.sln --configuration ${{ matrix.configuration }} --no-restore
      
    - name: Run tests
      if: matrix.platform == 'x64'
      run: dotnet test --no-build --verbosity normal
      
    - name: Publish
      run: |
        dotnet publish NVevaAce/NVevaAce.csproj `
          --configuration ${{ matrix.configuration }} `
          --runtime win-${{ matrix.platform }} `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -o ./publish/win-${{ matrix.platform }}
          
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: NVevaAce-win-${{ matrix.platform }}
        path: ./publish/win-${{ matrix.platform }}/*

  publish-release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          NVevaAce-win-x86/*
          NVevaAce-win-x64/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Check formatting
      run: dotnet format --verify-no-changes --verbosity diagnostic NVevaAce.sln
      continue-on-error: true
